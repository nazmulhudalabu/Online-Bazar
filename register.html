<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Meta -->

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | Khati Soday</title>

    <!-- Google Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Hind+Siliguri:wght@400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <!--=====================================
            Top Header
======================================-->

<section class="top-header">

    <div class="container">

        <p>

            আমাদের যে কোন পণ্য অর্ডার করতে কল বা WhatsApp করুন

            <span>

                <i class="bi bi-telephone-fill"></i>

                +880 1800000000

            </span>

        </p>

    </div>

</section>

<!--=====================================
            Login Header
======================================-->

<header class="login-header">

    <div class="container">

        <div class="d-flex justify-content-between align-items-center">

            <a href="index.html">

                <img src="images/logo.png"
                     alt="Khati Soday"
                     class="logo">

            </a>

            <a href="index.html"
               class="btn btn-outline-success">

                <i class="bi bi-house-door"></i>

                Home

            </a>

        </div>

    </div>

</header>
<!--=====================================
        Registration Section
======================================-->

<section class="login-section">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-6 col-md-8">

                <div class="login-card">

                    <div class="text-center mb-4">

                        <h2>

                            Create Account

                        </h2>

                        <p>

                            Join Khati Soday today

                        </p>

                    </div>

                    <form>

                        <!-- Full Name -->

                        <div class="mb-3">

                            <label class="form-label">

                                Full Name

                            </label>

                            <input type="text"
                                   class="form-control"
                                   placeholder="Enter your full name">

                        </div>

                        <!-- Email -->

                        <div class="mb-3">

                            <label class="form-label">

                                Email Address

                            </label>

                            <input type="email"
                                   class="form-control"
                                   placeholder="Enter your email">

                        </div>

                        <!-- Phone -->

                        <div class="mb-3">

                            <label class="form-label">

                                Phone Number

                            </label>

                            <input type="tel"
                                   class="form-control"
                                   placeholder="+8801XXXXXXXXX">

                        </div>

                        <!-- Password -->

                        <div class="mb-3">

                            <label class="form-label">

                                Password

                            </label>

                            <div class="password-box">

                                <input type="password"
                                       class="form-control"
                                       id="password"
                                       placeholder="Create password">

                                <span id="togglePassword">

                                    <i class="bi bi-eye"></i>

                                </span>

                            </div>

                        </div>

                        <!-- Confirm Password -->

                        <div class="mb-3">

                            <label class="form-label">

                                Confirm Password

                            </label>

                            <div class="password-box">

                                <input type="password"
                                       class="form-control"
                                       id="confirmPassword"
                                       placeholder="Confirm password">

                                <span id="toggleConfirmPassword">

                                    <i class="bi bi-eye"></i>

                                </span>

                            </div>

                        </div>

                        <!-- Terms -->

                        <div class="form-check mb-4">

                            <input class="form-check-input"
                                   type="checkbox"
                                   id="terms">

                            <label class="form-check-label"
                                   for="terms">

                                I agree to the Terms & Conditions

                            </label>

                        </div>

                        <!-- Button -->

                        <button type="submit"
                                class="btn btn-green w-100">

                            Create Account

                        </button>

                    </form>

                    <hr>

                    <p class="text-center">

                        Already have an account?

                        <a href="login.html"
                           class="register-link">

                            Login

                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

</section>
